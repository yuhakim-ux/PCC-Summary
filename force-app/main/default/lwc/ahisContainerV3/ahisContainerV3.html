<template>
    <lightning-card class="ahis-container-v3">
        <!-- Header with Persona Switcher -->
        <div slot="title" class="slds-grid slds-grid_vertical-align-center">
            <span class="slds-truncate card-title">Agentic Health Intelligence</span>
            <span class="version-badge">V3</span>
        </div>
        
        <div slot="actions" class="header-actions">
            <!-- Persona Switcher Dropdown -->
            <div class="persona-switcher-container">
                <lightning-combobox
                    label="View as"
                    value={selectedPersona}
                    options={personaOptions}
                    onchange={handlePersonaChange}
                    variant="label-hidden"
                    class="persona-switcher"
                    dropdown-alignment="right">
                </lightning-combobox>
            </div>
            
            <lightning-button-icon
                icon-name={expandIcon}
                alternative-text={expandAltText}
                title={expandAltText}
                onclick={handleExpandToggle}
                variant="border"
                class="slds-m-left_x-small">
            </lightning-button-icon>
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Regenerate Summary"
                onclick={handleRefresh}
                variant="border"
                disabled={isLoading}
                class="slds-m-left_x-small">
            </lightning-button-icon>
        </div>
        
        <!-- Persona Context Bar -->
        <div class="persona-context-bar">
            <div class="slds-grid slds-grid_vertical-align-center">
                <lightning-icon icon-name="utility:user" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <span class="persona-label">{userRoleBadge}</span>
                <span class="persona-description">{roleDescription}</span>
            </div>
        </div>
        
        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="slds-p-around_large slds-align_absolute-center loading-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                <p class="slds-m-top_medium slds-text-body_regular">Generating {userRoleBadge} view...</p>
            </div>
        </template>
        
        <!-- Error State -->
        <template if:true={hasError}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <lightning-icon icon-name="utility:error" alternative-text="Error" size="small" class="slds-m-right_x-small"></lightning-icon>
                    <span class="slds-text-body_regular">{errorMessage}</span>
                </div>
                <div class="slds-m-top_medium slds-align_absolute-center">
                    <lightning-button 
                        label="Try Again" 
                        onclick={handleRefresh}
                        variant="brand">
                    </lightning-button>
                </div>
            </div>
        </template>
        
        <!-- Main Content -->
        <template if:true={showContent}>
            <div class={contentClass}>
                <!-- Timestamp Row -->
                <div class="timestamp-row slds-m-bottom_small">
                    <span class="slds-text-body_small slds-text-color_weak">{formattedTimestamp}</span>
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        size="x-small"
                        onclick={handleRefresh}
                        class="timestamp-refresh">
                    </lightning-button-icon>
                </div>
                
                <!-- Summary Section -->
                <c-ahis-summary
                    summary={ahisData.summary}
                    generated-at={ahisData.generatedAt}
                    changes-since-last-visit={ahisData.changesSinceLastVisit}
                    user-role={userRole}
                    class="slds-m-bottom_medium">
                </c-ahis-summary>
                
                <!-- Key Insights Section -->
                <c-ahis-insights
                    insights={ahisData.insights}
                    user-role={userRole}
                    ondrildown={handleDrillDown}
                    class="slds-m-bottom_medium">
                </c-ahis-insights>
                
                <!-- Suggested Actions Section -->
                <c-ahis-actions
                    actions={ahisData.suggestedActions}
                    user-role={userRole}
                    onactionresponse={handleActionResponse}
                    onscheduleaction={handleScheduleAction}
                    class="slds-m-bottom_small">
                </c-ahis-actions>
            </div>
        </template>
    </lightning-card>
    
    <!-- Expanded Modal View -->
    <template if:true={isExpanded}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-v3" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleExpandToggle}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 id="modal-heading-v3" class="slds-modal__title slds-hyphenate">
                        <lightning-icon icon-name="custom:custom63" size="small" class="slds-m-right_small"></lightning-icon>
                        Agentic Health Intelligence - {userRoleBadge} View
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Expanded Summary -->
                    <c-ahis-summary
                        summary={ahisData.summary}
                        generated-at={ahisData.generatedAt}
                        changes-since-last-visit={ahisData.changesSinceLastVisit}
                        user-role={userRole}
                        is-expanded="true"
                        class="slds-m-bottom_medium">
                    </c-ahis-summary>
                    
                    <!-- Expanded Insights -->
                    <c-ahis-insights
                        insights={ahisData.insights}
                        user-role={userRole}
                        is-expanded="true"
                        ondrildown={handleDrillDown}
                        class="slds-m-bottom_medium">
                    </c-ahis-insights>
                    
                    <!-- Expanded Actions -->
                    <c-ahis-actions
                        actions={ahisData.suggestedActions}
                        user-role={userRole}
                        is-expanded="true"
                        onactionresponse={handleActionResponse}
                        onscheduleaction={handleScheduleAction}>
                    </c-ahis-actions>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleExpandToggle}></lightning-button>
                    <lightning-button variant="brand" label="Refresh" onclick={handleRefresh}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
    <!-- Drill Down Panel -->
    <template if:true={showDrillDown}>
        <c-ahis-drill-down
            record-id={recordId}
            drill-down-type={drillDownType}
            drill-down-title={drillDownTitle}
            onclose={handleCloseDrillDown}>
        </c-ahis-drill-down>
    </template>
</template>
