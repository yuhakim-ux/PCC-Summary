<template>
    <!-- Slide-out Panel -->
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="drill-down-heading" class="slds-panel slds-size_medium slds-panel_docked slds-panel_docked-right slds-is-open drill-down-panel">
        <div class="slds-panel__header">
            <h2 id="drill-down-heading" class="slds-panel__header-title slds-text-heading_small slds-truncate" title={panelTitle}>
                <lightning-icon icon-name={typeIcon} size="small" class="slds-m-right_small"></lightning-icon>
                {panelTitle}
            </h2>
            <div class="slds-panel__header-actions">
                <lightning-button-icon
                    icon-name="utility:refresh"
                    alternative-text="Refresh"
                    title="Refresh"
                    onclick={handleRefresh}
                    disabled={isLoading}
                    class="slds-m-right_x-small">
                </lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Close"
                    title="Close panel"
                    onclick={handleClose}>
                </lightning-button-icon>
            </div>
        </div>
        
        <div class="slds-panel__body">
            <!-- Loading State -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                </div>
            </template>
            
            <!-- Error State -->
            <template if:true={hasError}>
                <div class="slds-p-around_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <lightning-icon icon-name="utility:error" alternative-text="Error" size="small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{errorMessage}</span>
                    </div>
                    <div class="slds-m-top_medium slds-align_absolute-center">
                        <lightning-button label="Try Again" onclick={handleRefresh} variant="brand"></lightning-button>
                    </div>
                </div>
            </template>
            
            <!-- No Records State -->
            <template if:false={isLoading}>
                <template if:false={hasError}>
                    <template if:false={hasRecords}>
                        <div class="slds-illustration slds-illustration_small slds-p-around_large">
                            <div class="slds-text-longform">
                                <h3 class="slds-text-heading_small">No Records Found</h3>
                                <p class="slds-text-body_regular slds-text-color_weak">
                                    There are no {panelTitle} records to display.
                                </p>
                            </div>
                        </div>
                    </template>
                    
                    <!-- Records List -->
                    <template if:true={hasRecords}>
                        <div class="slds-p-horizontal_small">
                            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                Showing {recordCount} records
                            </p>
                            
                            <ul class="slds-has-dividers_bottom-space">
                                <template for:each={formattedRecords} for:item="record">
                                    <li key={record.rowKey} class="slds-item">
                                        <article class="slds-tile slds-tile_board drill-down-tile" 
                                                 data-record-id={record.id}
                                                 onclick={handleRecordClick}>
                                            <h3 class="slds-tile__title slds-truncate" title={record.name}>
                                                <a href="javascript:void(0);">{record.name}</a>
                                            </h3>
                                            <div class="slds-tile__detail">
                                                <dl class="slds-list_horizontal slds-wrap">
                                                    <template for:each={record.formattedFields} for:item="field">
                                                        <template if:false={field.isName}>
                                                            <dt key={field.key} class="slds-item_label slds-text-color_weak slds-truncate" title={field.label}>
                                                                {field.label}:
                                                            </dt>
                                                            <dd key={field.key} class="slds-item_detail slds-truncate" title={field.value}>
                                                                <template if:true={field.isStatus}>
                                                                    <lightning-badge label={field.value}></lightning-badge>
                                                                </template>
                                                                <template if:false={field.isStatus}>
                                                                    {field.value}
                                                                </template>
                                                            </dd>
                                                        </template>
                                                    </template>
                                                </dl>
                                            </div>
                                        </article>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </template>
            </template>
        </div>
        
        <footer class="slds-panel__footer">
            <lightning-button label="Close" onclick={handleClose} class="slds-m-right_x-small"></lightning-button>
        </footer>
    </section>
    
    <!-- Backdrop -->
    <div class="slds-backdrop slds-backdrop_open drill-down-backdrop" onclick={handleClose}></div>
</template>
