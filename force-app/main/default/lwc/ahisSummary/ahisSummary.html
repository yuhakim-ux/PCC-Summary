<template>
    <div class="ahis-summary-container">
        <!-- Section Header -->
        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
            <div class="slds-col">
                <h3 class="slds-text-heading_small slds-text-color_default">
                    <lightning-icon icon-name="utility:summary" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    Summary
                </h3>
            </div>
            <div class="slds-col_bump-left">
                <lightning-badge 
                    if:true={roleLabel}
                    label={roleLabel}
                    class="role-indicator">
                </lightning-badge>
            </div>
        </div>
        
        <!-- Main Summary Text -->
        <div class="summary-text slds-p-around_medium slds-box">
            <p class="slds-text-body_regular">{summary}</p>
        </div>
        
        <!-- Changes Since Last Visit -->
        <template if:true={hasChanges}>
            <div class="changes-section slds-m-top_medium">
                <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                    <lightning-icon icon-name="utility:change_record_type" size="x-small" class="slds-m-right_x-small change-icon"></lightning-icon>
                    <span class="slds-text-title_caps changes-header">What's Changed</span>
                </div>
                <ul class="slds-list_dotted changes-list">
                    <template for:each={changesSinceLastVisit} for:item="change">
                        <li key={change} class="slds-item change-item">
                            <span class="change-indicator"></span>
                            {change}
                        </li>
                    </template>
                </ul>
            </div>
        </template>
        
        <!-- Role-Specific Context -->
        <template if:true={showRoleContext}>
            <div class="role-context slds-m-top_medium slds-p-around_small">
                <lightning-icon icon-name={roleContextIcon} size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <span class="slds-text-body_small">{roleContextMessage}</span>
            </div>
        </template>
    </div>
</template>
