<template>
    <div class="ahis-summary-container">
        <!-- Summary Header -->
        <p class="section-header">Summary</p>
        
        <!-- Summary Text -->
        <p class="summary-text">{summary}</p>
        
        <!-- Divider -->
        <div class="section-divider"></div>
        
        <!-- What's Changed Section -->
        <template if:true={hasChanges}>
            <p class="section-header">What's Changed</p>
            
            <!-- Informational Banner - Scoped Notification -->
            <div class="info-banner">
                <lightning-icon icon-name="utility:clock" size="x-small" class="info-icon"></lightning-icon>
                <span class="info-text">Review escalated Prior Auth cases</span>
            </div>
            
            <!-- Changes List -->
            <div class="changes-list">
                <template for:each={changesSinceLastVisit} for:item="change">
                    <div key={change} class="change-item">
                        <span class="change-indicator"></span>
                        <span class="change-text">{change}</span>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
