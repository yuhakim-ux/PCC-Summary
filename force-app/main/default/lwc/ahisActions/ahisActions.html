<template>
    <div class={containerClass}>
        <!-- Section Header -->
        <p class="section-header">Suggested Actions</p>
        
        <!-- No Actions State -->
        <template if:false={hasActions}>
            <div class="slds-illustration slds-illustration_small slds-p-around_medium">
                <div class="slds-text-longform">
                    <p class="slds-text-body_regular slds-text-color_weak">No suggested actions at this time.</p>
                </div>
            </div>
        </template>
        
        <!-- Actions List - Accordion -->
        <template if:true={hasActions}>
            <lightning-accordion allow-multiple-sections-open class="actions-accordion">
                <template for:each={formattedActions} for:item="action">
                    <lightning-accordion-section 
                        key={action.id}
                        name={action.id} 
                        label={action.accordionLabel}>
                        
                        <!-- Action Content -->
                        <div class="action-content">
                            <!-- Action Header with Icon and Priority -->
                            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                <div class="slds-col slds-grid slds-grid_vertical-align-center">
                                    <lightning-icon 
                                        icon-name={action.actionIcon} 
                                        size="small" 
                                        class="slds-m-right_small action-type-icon">
                                    </lightning-icon>
                                    <span class="slds-badge action-type-badge">{action.actionTypeLabel}</span>
                                </div>
                                <div class="slds-col_bump-left">
                                    <!-- Priority Badge -->
                                    <span class={action.priorityClass}>
                                        <lightning-icon 
                                            icon-name={action.priorityIcon} 
                                            size="xx-small" 
                                            class="slds-m-right_xx-small">
                                        </lightning-icon>
                                        {action.priority}
                                    </span>
                                </div>
                            </div>
                            
                            <!-- Action Description -->
                            <p class="slds-text-body_regular slds-m-bottom_small action-description">
                                {action.description}
                            </p>
                            
                            <!-- Action Buttons - Accept + Dropdown Menu -->
                            <template if:true={action.isPending}>
                                <div class="action-buttons slds-grid slds-grid_align-start">
                                    <lightning-button
                                        variant="brand"
                                        label="Accept"
                                        title="Accept this action"
                                        data-action-id={action.id}
                                        onclick={handleAccept}
                                        class="slds-m-right_x-small">
                                    </lightning-button>
                                    <lightning-button-menu
                                        alternative-text="More actions"
                                        variant="border"
                                        icon-name="utility:down"
                                        menu-alignment="auto"
                                        data-action-id={action.id}
                                        onselect={handleMenuSelect}>
                                        <lightning-menu-item 
                                            value="edit" 
                                            label="Edit"
                                            prefix-icon-name="utility:edit">
                                        </lightning-menu-item>
                                        <lightning-menu-item 
                                            value="dismiss" 
                                            label="Dismiss"
                                            prefix-icon-name="utility:close">
                                        </lightning-menu-item>
                                    </lightning-button-menu>
                                </div>
                            </template>
                            
                            <!-- Status Indicator (when not pending) -->
                            <template if:true={action.isAccepted}>
                                <div class="action-status accepted">
                                    <lightning-icon icon-name="utility:success" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                    <span>Accepted</span>
                                </div>
                            </template>
                            <template if:true={action.isModified}>
                                <div class="action-status modified">
                                    <lightning-icon icon-name="utility:edit" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                    <span>Modified</span>
                                </div>
                            </template>
                            <template if:true={action.isDismissed}>
                                <div class="action-status dismissed">
                                    <lightning-icon icon-name="utility:close" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                    <span>Dismissed</span>
                                </div>
                            </template>
                        </div>
                    </lightning-accordion-section>
                </template>
            </lightning-accordion>
        </template>
    </div>
    
    <!-- Notes Modal -->
    <template if:true={showNotesModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="notes-modal-heading" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleModalCancel}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 id="notes-modal-heading" class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="slds-m-bottom_small">{modalMessage}</p>
                    <lightning-textarea 
                        label="Notes"
                        value={notesValue}
                        onchange={handleNotesChange}
                        placeholder="Enter your notes here..."
                        max-length="500">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleModalCancel}></lightning-button>
                    <lightning-button variant="brand" label="Confirm" onclick={handleModalConfirm} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
