<template>
    <span class="citation-wrapper">
        <button class="citation-btn" onclick={handleClick} aria-expanded={isOpen} title={tooltipText}>
            {label}
        </button>
        <template lwc:if={isOpen}>
            <div class="citation-popover" role="tooltip">
                <div class="popover-header">
                    <span class="popover-title">Source</span>
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        size="x-small"
                        variant="bare"
                        onclick={handleClose}>
                    </lightning-button-icon>
                </div>
                <div class="popover-body">
                    <template lwc:if={sourceIconName}>
                        <lightning-icon icon-name={sourceIconName} size="xx-small" class="popover-source-icon"></lightning-icon>
                    </template>
                    <a href="javascript:void(0)" class="popover-source-name" onclick={handleNavigate}>{sourceName}</a>
                    <span class="popover-source-dot">·</span>
                    <span class="popover-source-type">{sourceType}</span>
                </div>
            </div>
        </template>
    </span>
</template>
