<template>
    <template lwc:if={hasItems}>
        <ul class="alert-list">
            <template for:each={visibleItems} for:item="alert">
                <li key={alert.key} class={alert.className}>
                    <span class={alert.dotClass}></span>
                    <span class="alert-text">{alert.text}</span>
                    <template lwc:if={alert.hasSources}>
                        <ui-ahis-citation sources={alert.sources}></ui-ahis-citation>
                    </template>
                </li>
            </template>
        </ul>
        <template lwc:if={hasMore}>
            <button class="show-more-btn" onclick={handleShowAll}>+ {hiddenCount} more</button>
        </template>
    </template>
</template>
