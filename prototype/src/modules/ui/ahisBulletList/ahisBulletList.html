<template>
    <template lwc:if={hasItems}>
        <ul class="bullet-list">
            <template for:each={visibleItems} for:item="item">
                <li key={item.key} class={item.computedClass}>
                    <template lwc:if={item.isDetail}>
                        <div class="detail-primary">
                            <template lwc:if={item.isBadge}>
                                <lightning-badge label={item.badge} class={item.badgeClass}></lightning-badge>
                            </template>
                            <template lwc:if={item.isDot}>
                                <span class={item.dotClass}></span>
                                <span class="dot-label">{item.badge}</span>
                            </template>
                            <span class="item-primary">{item.primary}</span>
                            <template lwc:if={item.secondary}>
                                <span class="item-secondary">{item.secondary}</span>
                            </template>
                        </div>
                        <template lwc:if={item.hasMetaLine}>
                            <div class="detail-meta">
                                <template for:each={item.metaItems} for:item="meta">
                                    <span key={meta.key} class="item-secondary">{meta.text}</span>
                                </template>
                            </div>
                        </template>
                        <template lwc:if={item.note}>
                            <span class="item-note">{item.note}</span>
                        </template>
                    </template>
                    <template lwc:else>
                        <template lwc:if={item.isBadge}>
                            <lightning-badge label={item.badge} class={item.badgeClass}></lightning-badge>
                        </template>
                        <template lwc:if={item.isDot}>
                            <span class={item.dotClass}></span>
                            <span class="dot-label">{item.badge}</span>
                        </template>
                        <span class="item-primary">{item.primary}</span>
                        <template lwc:if={item.secondary}>
                            <span class="item-secondary">{item.secondary}</span>
                        </template>
                        <template lwc:if={item.note}>
                            <span class="item-note">{item.note}</span>
                        </template>
                    </template>
                </li>
            </template>
        </ul>
        <template lwc:if={hasMore}>
            <button class="show-more-btn" onclick={handleShowAll}>+ {hiddenCount} more</button>
        </template>
    </template>
</template>
