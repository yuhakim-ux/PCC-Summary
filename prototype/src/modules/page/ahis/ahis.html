<template>
    <!-- Record Page Header -->
    <div class="slds-page-header slds-page-header_record-home record-header">
        <div class="slds-page-header__row">
            <div class="slds-page-header__col-title">
                <div class="slds-media">
                    <div class="slds-media__figure">
                        <span class="slds-icon_container record-icon">
                            <lightning-icon icon-name={recordHeader.recordIcon} size="medium"></lightning-icon>
                        </span>
                    </div>
                    <div class="slds-media__body">
                        <div class="slds-page-header__name">
                            <div class="slds-page-header__name-title">
                                <h1>
                                    <span class="record-type-label">{recordHeader.recordTypeLabel}</span>
                                    <span class="slds-page-header__title slds-truncate record-name card-header-title-match" title={recordHeader.recordName}>{recordHeader.recordName}</span>
                                </h1>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__col-actions">
                <div class="slds-page-header__controls">
                    <div class="slds-page-header__control">
                        <lightning-button
                            label={followLabel}
                            variant={followVariant}
                            icon-name={followIconName}
                            onclick={handleFollow}>
                        </lightning-button>
                    </div>
                    <div class="slds-page-header__control">
                        <lightning-button-group>
                            <lightning-button label="Edit" variant="neutral"></lightning-button>
                            <lightning-button label="Clone" variant="neutral"></lightning-button>
                            <lightning-button-menu
                                alternative-text="More Actions"
                                variant="border-filled"
                                icon-size="medium"
                                menu-alignment="right">
                                <lightning-menu-item label="Send Email" value="send_email" icon-name="utility:email"></lightning-menu-item>
                                <lightning-menu-item label="Log a Call" value="log_call" icon-name="utility:log_a_call"></lightning-menu-item>
                                <lightning-menu-item label="Create Task" value="create_task" icon-name="utility:task"></lightning-menu-item>
                                <lightning-menu-item label="Printable View" value="printable" icon-name="utility:print"></lightning-menu-item>
                            </lightning-button-menu>
                        </lightning-button-group>
                    </div>
                </div>
            </div>
        </div>
        <div class="slds-page-header__row slds-page-header__row_gutters">
            <div class="slds-page-header__col-details">
                <ul class="slds-page-header__detail-row">
                    <template for:each={recordHeader.fields} for:item="field">
                        <li key={field.label} class="slds-page-header__detail-block">
                            <div class="slds-truncate detail-label" title={field.label}>{field.label}</div>
                            <template lwc:if={field.isPhone}>
                                <div class="slds-truncate detail-value">
                                    <lightning-formatted-phone value={field.value}></lightning-formatted-phone>
                                </div>
                            </template>
                            <template lwc:else>
                                <div class="slds-truncate detail-value" title={field.value}>{field.value}</div>
                            </template>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </div>

    <!-- Record Body: Two-Column Layout -->
    <div class="slds-grid slds-gutters_small slds-wrap record-body">

        <!-- Main Column: AHIS Component (8/12) -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_8-of-12">

            <!-- AHIS Card -->
            <lightning-card class="ahis-shell">
                <div slot="title" class="title-row">
                    <div class="title-block">
                        <p class="slds-truncate title-text card-header-title-match">{cardTitle}</p>
                    </div>
                </div>

                <div slot="actions" class="actions-row">
                    <template lwc:if={showContent}>
                        <span class="content-timestamp">{formattedTimestamp}</span>
                        <lightning-button-icon
                            icon-name="utility:refresh"
                            alternative-text="Regenerate"
                            title="Regenerate Summary"
                            size="x-small"
                            variant="bare"
                            onclick={handleRefresh}
                            class="regenerate-btn">
                        </lightning-button-icon>
                    </template>
                    <lightning-button-menu
                        alternative-text="More options"
                        variant="bare"
                        icon-name="utility:threedots"
                        icon-size="x-small"
                        menu-alignment="right">
                        <lightning-menu-item label="Regenerate" value="regenerate" icon-name="utility:refresh"></lightning-menu-item>
                        <lightning-menu-item label="Copy Summary" value="copy" icon-name="utility:copy"></lightning-menu-item>
                        <lightning-menu-item label="Export as PDF" value="export" icon-name="utility:download"></lightning-menu-item>
                    </lightning-button-menu>
                </div>


                <!-- Loading State (Streaming skeleton) -->
                <template lwc:if={isLoading}>
                    <div class="loading-area">
                        <div class="streaming-content">
                            <div class="streaming-title-skeleton">
                                <div class="skeleton-line skeleton-line-title"></div>
                            </div>
                            <div class="streaming-body-skeleton">
                                <div class="skeleton-line skeleton-line-long stream-delay-1"></div>
                                <div class="skeleton-line skeleton-line-long stream-delay-2"></div>
                                <div class="skeleton-line skeleton-line-medium stream-delay-3"></div>
                                <div class="skeleton-line skeleton-line-short stream-delay-4"></div>
                            </div>
                            <div class="streaming-body-skeleton stream-delay-5">
                                <div class="skeleton-line skeleton-line-long stream-delay-5"></div>
                                <div class="skeleton-line skeleton-line-medium stream-delay-6"></div>
                            </div>
                        </div>
                        <p class="loading-message">
                            <span class="loading-dot-pulse"></span>
                            Generating summary
                        </p>
                    </div>
                </template>

                <!-- Error State -->
                <template lwc:if={hasError}>
                    <div class="slds-p-around_medium">
                        <div class="slds-notify slds-notify_alert slds-alert_error slds-grid slds-grid_vertical-align-center" role="alert">
                            <lightning-icon icon-name="utility:error" alternative-text="Error" size="small" class="slds-m-right_x-small"></lightning-icon>
                            <span class="slds-text-body_regular">{errorMessage}</span>
                        </div>
                        <div class="slds-m-top_medium slds-align_absolute-center">
                            <lightning-button label="Try Again" onclick={handleRefresh} variant="brand"></lightning-button>
                        </div>
                    </div>
                </template>

                <!-- Generate State (Empty) -->
                <template lwc:if={showGenerateState}>
                    <div class="generate-empty-state">
                        <div class="empty-illustration">
                            <lightning-icon icon-name="utility:sparkles" size="large" class="empty-sparkles-icon"></lightning-icon>
                        </div>
                        <p class="empty-title">Generate Summary</p>
                        <p class="empty-body">Click Generate to create a persona-aware health intelligence summary.</p>
                        <div class="empty-cta">
                            <lightning-button
                                label="Generate"
                                variant="brand"
                                icon-name="utility:sparkles"
                                onclick={handleGenerate}>
                            </lightning-button>
                        </div>
                    </div>
                </template>

                <!-- Main Content -->
                <template lwc:if={showContent}>
                    <div class="ahis-content-wrapper">
                        <!-- CONTEXT ZONE -->
                        <div class="ahis-context-zone">
                            <section class="nested-card">
                                <div class="nested-card-header">
                                    <lightning-icon icon-name="utility:sparkles" size="x-small" class="sparkles-icon"></lightning-icon>
                                    <span class="nested-card-title">Key Insights</span>
                                </div>
                                <template lwc:if={hasMicroSummary}>
                                    <ul class="summary-bullets">
                                        <template for:each={microSummaryItems} for:item="item">
                                            <li key={item.key} class="summary-bullet">{item.text}</li>
                                        </template>
                                    </ul>
                                </template>
                            </section>
                        </div>

                        <!-- DETAILS ZONE (hidden when collapsed) -->
                        <template lwc:if={isExpanded}>
                            <div class="ahis-zone-divider"></div>
                            <div class="ahis-details-zone">
                                <ui-ahis-summary
                                    ahis-data={ahisData}
                                    persona={resolvedPersona}>
                                </ui-ahis-summary>
                            </div>
                        </template>

                        <!-- Action Bar — hidden (set showActionBar=true to restore) -->
                        <template lwc:if={showActionBar}>
                            <div class="content-footer-row">
                                <div class="content-footer-left">
                                    <lightning-button
                                        label={primaryActionLabel}
                                        variant="brand"
                                        icon-name={primaryActionIcon}
                                        class="footer-primary-btn">
                                    </lightning-button>
                                    <lightning-button
                                        label={secondaryActionLabel}
                                        variant="neutral"
                                        class="footer-secondary-btn">
                                    </lightning-button>
                                </div>
                                <ui-ahis-feedback
                                    content-id="summary"
                                    onfeedback={handleFeedback}>
                                </ui-ahis-feedback>
                            </div>
                        </template>
                    </div>


                    <!-- Toggle button at the very bottom -->
                    <div class="card-toggle">
                        <button class="toggle-btn" onclick={handleToggleExpand}>{toggleLabel}</button>
                    </div>
                </template>
            </lightning-card>
        </div>

        <!-- Right Column: Sidebar (4/12) -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12 sidebar-col">

            <!-- Activity Timeline -->
            <lightning-card title="Activity" class="sidebar-card">
                <lightning-button-group slot="actions">
                    <lightning-button label="Log a Call" variant="neutral"></lightning-button>
                    <lightning-button label="New Task" variant="neutral"></lightning-button>
                </lightning-button-group>
                <div class="slds-p-around_small">
                    <ul class="activity-list">
                        <template for:each={activityItems} for:item="item">
                            <li key={item.id} class="activity-item">
                                <div class="activity-icon-col">
                                    <lightning-icon
                                        icon-name={item.iconName}
                                        size="small"
                                        alternative-text={item.type}>
                                    </lightning-icon>
                                    <div class="activity-connector"></div>
                                </div>
                                <div class="activity-content">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                        <p class="activity-subject">{item.subject}</p>
                                        <p class="activity-date">{item.date}</p>
                                    </div>
                                    <p class="activity-desc">{item.description}</p>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </lightning-card>

            <!-- Related Lists -->
            <div class="sidebar-spacer"></div>
            <lightning-card title="Related" class="sidebar-card">
                <div class="slds-p-around_small">
                    <ul class="related-list">
                        <template for:each={relatedLists} for:item="rel">
                            <li key={rel.id} class="related-list-item">
                                <lightning-icon icon-name={rel.iconName} size="small" class="related-item-icon"></lightning-icon>
                                <span class="related-item-label">{rel.label}</span>
                                <lightning-badge label={rel.count} class="related-count"></lightning-badge>
                            </li>
                        </template>
                    </ul>
                </div>
            </lightning-card>
        </div>
    </div>

    <!-- Floating Summary Type Picker (demo control) -->
    <div class="fab-persona slds-is-fixed">
        <lightning-button-icon
            icon-name="utility:people"
            variant="border-filled"
            size="large"
            alternative-text="Switch summary type"
            title="Switch summary type"
            aria-haspopup="true"
            aria-expanded={isPersonaPickerOpen}
            onclick={handlePersonaFabClick}>
        </lightning-button-icon>
        <template lwc:if={isPersonaPickerOpen}>
            <div class="fab-persona-backdrop" onclick={handlePersonaBackdropClick} role="presentation"></div>
            <div class="fab-persona-card-wrapper">
                <lightning-card title="Summary Type" class="fab-persona-card">
                    <div class="slds-p-around_small">
                        <lightning-combobox
                            label="Persona"
                            value={currentRole}
                            options={roleOptions}
                            onchange={handleRoleChange}
                            variant="label-hidden"
                            class="fab-role-picker">
                        </lightning-combobox>
                        <p class="fab-demo-hint">
                            <lightning-icon icon-name="utility:info_alt" size="xx-small" class="demo-label-icon"></lightning-icon>
                            Demo control — not shipped
                        </p>
                    </div>
                </lightning-card>
            </div>
        </template>
    </div>
</template>
